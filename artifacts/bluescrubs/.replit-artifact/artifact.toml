kind = "web"
previewPath = "/"
title = "BlueScrubsPrep"
version = "1.0.0"
id = "artifacts/bluescrubs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20364

[services.development]
run = "pnpm --filter @workspace/bluescrubs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bluescrubs", "run", "build" ]
publicDir = "artifacts/bluescrubs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20364"
BASE_PATH = "/"
